<div class="modal-backdrop" (click)="closed.emit()">
  <div class="modal-box" (click)="$event.stopPropagation()">
    <div class="modal-header">
      <h2>Assign to Bin</h2>
      <button type="button" class="btn btn-secondary btn-sm" (click)="closed.emit()">×</button>
    </div>
    <div class="modal-body">
      <p class="mb">Selected {{ selectedCount }} item(s). Choose a bin number (1–100).</p>
      <div class="form-group">
        <label>Bin number</label>
        <select class="form-control" [(ngModel)]="binNumber">
          @for (b of binOptions; track b) {
            <option [value]="b">{{ b }}</option>
          }
        </select>
      </div>
    </div>
    <div class="modal-footer">
      <button type="button" class="btn btn-secondary" (click)="closed.emit()">Cancel</button>
      <button type="button" class="btn btn-primary" (click)="submit()">Assign Bin</button>
    </div>
  </div>
</div>
