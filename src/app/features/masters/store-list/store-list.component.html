<div class="page-header">
  <h1>Stores</h1>
  <p class="subtitle">Manage stores (outlets). No delete option.</p>
  <div class="actions">
    <button type="button" class="btn btn-secondary" (click)="downloadSample()">Download sample file</button>
    <label class="btn btn-secondary">
      <input type="file" accept=".csv,.xlsx" (change)="onBulkFileSelect($event)" hidden />
      Bulk upload
    </label>
    <button type="button" class="btn btn-primary" (click)="openAdd()">Add store</button>
  </div>
</div>

@if (showModal) {
  <div class="modal-backdrop" (click)="closeModal()">
    <div class="modal-box" (click)="$event.stopPropagation()">
      <div class="modal-header">
        <h2>{{ editingId ? 'Edit store' : 'Add store' }}</h2>
        <button type="button" class="btn btn-secondary btn-sm" (click)="closeModal()">×</button>
      </div>
      <div class="modal-body">
        <div class="form-group">
          <label>Name</label>
          <input type="text" class="form-control" [(ngModel)]="name" />
        </div>
        <div class="form-group">
          <label>Code</label>
          <input type="text" class="form-control" [(ngModel)]="code" placeholder="e.g. OUT-CHE-01" />
        </div>
        <div class="form-group">
          <label>Address</label>
          <textarea class="form-control" [(ngModel)]="address" rows="2"></textarea>
        </div>
      </div>
      <div class="modal-footer">
        <button type="button" class="btn btn-secondary" (click)="closeModal()">Cancel</button>
        <button type="button" class="btn btn-primary" (click)="save()" [disabled]="saving || !name?.trim()">
          {{ saving ? 'Saving…' : (editingId ? 'Update' : 'Add') }}
        </button>
      </div>
    </div>
  </div>
}

<div class="table-wrap">
  <table>
    <thead>
      <tr>
        <th>Name</th>
        <th>Code</th>
        <th>Address</th>
        <th>Actions</th>
      </tr>
    </thead>
    <tbody>
      @for (s of stores; track s.id) {
        <tr>
          <td>{{ s.name }}</td>
          <td>{{ s.code }}</td>
          <td>{{ s.address }}</td>
          <td>
            <button type="button" class="btn btn-sm btn-secondary" (click)="openEdit(s)">Edit</button>
          </td>
        </tr>
      }
      @empty {
        <tr>
          <td colspan="4" class="empty">No stores. Add a store above.</td>
        </tr>
      }
    </tbody>
  </table>
</div>
