<div
  class="login-page d-flex align-items-center justify-content-center min-vh-100 position-relative overflow-hidden"
>
  <div
    class="bg-grid position-absolute top-0 start-0 w-100 h-100"
    style="pointer-events: none; z-index: 0"
  ></div>

  <div
    class="login-wrapper d-flex overflow-hidden rounded-3 position-relative"
    style="z-index: 1; margin: 24px"
  >
    <div
      class="brand-panel d-flex align-items-center px-5 position-relative overflow-hidden"
      style="padding-top: 60px; padding-bottom: 60px"
    >
      <div class="position-relative" style="z-index: 1">
        <div class="brand-icon fs-1 mb-4">🏭</div>
        <h1
          class="fw-bold text-white mb-2"
          style="font-size: 1.75rem; letter-spacing: -0.3px"
        >
          Sangeetha WHM
        </h1>
        <p
          class="text-uppercase mb-5"
          style="
            font-size: 13px;
            letter-spacing: 1.2px;
            color: var(--text-muted);
          "
        >
          Warehouse Management System
        </p>

        <div class="brand-features d-flex flex-column gap-3">
          <div
            class="d-flex align-items-center gap-3"
            style="color: rgba(255, 255, 255, 0.75); font-size: 14px"
          >
            <span class="feature-dot"></span
            ><span>Real-time inventory tracking</span>
          </div>
          <div
            class="d-flex align-items-center gap-3"
            style="color: rgba(255, 255, 255, 0.75); font-size: 14px"
          >
            <span class="feature-dot"></span
            ><span>Smart dispatch &amp; routing</span>
          </div>
          <div
            class="d-flex align-items-center gap-3"
            style="color: rgba(255, 255, 255, 0.75); font-size: 14px"
          >
            <span class="feature-dot"></span><span>Multi-store allocation</span>
          </div>
        </div>
      </div>
    </div>

    <div class="login-card d-flex flex-column justify-content-center p-5">
      <div class="card-header bg-transparent border-0 p-0 mb-4">
        <h2 class="fw-bold mb-1">Welcome back</h2>
        <p class="text-muted mb-0" style="font-size: 14px">
          Sign in to your admin account
        </p>
      </div>

      <!-- CHANGE: text-muted class hatayi, color inline diya — Bootstrap override nahi karega -->
      <div class="mb-3">
        <label
          class="form-label fw-medium text-uppercase"
          style="
            font-size: 13px;
            letter-spacing: 0.5px;
            color: var(--text-muted);
          "
          for="username"
          >Username</label
        >
        <div class="position-relative d-flex align-items-center">
          <span
            class="position-absolute ms-2"
            style="font-size: 15px; pointer-events: none"
            >👤</span
          >
          <input
            id="username"
            class="form-control rounded ps-5"
            type="text"
            [(ngModel)]="username"
            placeholder="Enter your username"
            (keyup.enter)="onLogin()"
            autocomplete="username"
          />
        </div>
      </div>

      <!-- CHANGE: same label fix -->
      <div class="mb-3">
        <label
          class="form-label fw-medium text-uppercase"
          style="
            font-size: 13px;
            letter-spacing: 0.5px;
            color: var(--text-muted);
          "
          for="password"
          >Password</label
        >
        <div class="position-relative d-flex align-items-center">
          <span
            class="position-absolute ms-2"
            style="font-size: 15px; pointer-events: none"
            >🔒</span
          >
          <input
            id="password"
            class="form-control rounded ps-5"
            [type]="showPassword ? 'text' : 'password'"
            [(ngModel)]="password"
            placeholder="Enter your password"
            (keyup.enter)="onLogin()"
            autocomplete="current-password"
          />
          <button
            class="position-absolute end-0 me-2 bg-transparent border-0 cursor-pointer transition"
            style="opacity: 0.7; font-size: 15px"
            type="button"
            (click)="togglePassword()"
          >
            {{ showPassword ? "🙈" : "👁️" }}
          </button>
        </div>
      </div>

      <div
        class="error-alert d-flex align-items-center gap-2 rounded p-2 mb-3"
        *ngIf="error"
      >
        <span>⚠️</span> {{ error }}
      </div>

      <!-- CHANGE: d-block add kiya — w-100 btn ke saath akele kaam nahi karta -->
      <button
        class="btn btn-primary login-btn d-block w-100 rounded fw-semibold mt-1 transition"
        style="padding: 13px; font-size: 15px"
        (click)="onLogin()"
        [disabled]="loading"
      >
        <span *ngIf="!loading">Sign In →</span>
        <span
          *ngIf="loading"
          class="d-flex align-items-center justify-content-center gap-2"
        >
          <span class="spinner"></span> Signing in...
        </span>
      </button>
    </div>
  </div>
</div>
